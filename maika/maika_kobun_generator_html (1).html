<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>マイカ構文ジェネレーター</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <style>
    body {
      background: #f7f7fb;
    }

    .fixed-text {
      white-space: pre-wrap;
    }

    #resultText {
      min-height: 180px;
      background: #fafafa;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main class="container py-4 py-md-5">
    <section class="card shadow-sm border-0 rounded-4 mx-auto" style="max-width: 720px;">
      <div class="card-body p-4 p-md-5">
        <h1 class="h3 fw-bold mb-2">マイカ構文ジェネレーター</h1>
        <p class="text-secondary mb-4">
          本文とハッシュタグを入れると、前後をマイカ構文で包んだ投稿文を生成します。
        </p>

        <div class="fixed-text alert alert-primary mb-3">
あの、余計なお世話なのかも知れないですけど、
        </div>

        <div class="mb-3">
          <div class="d-flex align-items-center justify-content-between gap-2 mb-2">
            <label for="bodyText" class="form-label fw-bold mb-0">本文</label>
            <button id="clearBody" type="button" class="btn btn-sm btn-outline-secondary" aria-label="本文をクリア">✗</button>
          </div>
          <textarea id="bodyText" class="form-control" rows="5" placeholder="ここに本文を入力"></textarea>
          <div class="form-text">改行もそのまま反映されます。</div>
        </div>

        <div class="fixed-text alert alert-primary mb-3">
あ、本当に余計なお世話でしたね、ごめんなさい…
        </div>

        <div class="mb-4">
          <div class="d-flex align-items-center justify-content-between gap-2 mb-2">
            <label for="hashtagText" class="form-label fw-bold mb-0">ハッシュタグ</label>
            <button id="clearHashtag" type="button" class="btn btn-sm btn-outline-secondary" aria-label="ハッシュタグをクリア">✗</button>
          </div>
          <input id="hashtagText" type="text" class="form-control" placeholder="#蓮ノ空 #マイカ構文" />
          <div class="form-text">
            #なしで入力した単語は、自動で # を付けます。スペース区切り・カンマ区切り対応。
          </div>
        </div>

        <div class="d-flex align-items-center justify-content-between gap-3 mb-2">
          <label for="resultText" class="form-label fw-bold mb-0">生成結果</label>
          <span id="finalCount" class="badge rounded-pill text-bg-success">0 / 140</span>
        </div>

        <textarea
          id="resultText"
          class="form-control mb-3"
          placeholder="タップでコピーできます"
          readonly
        ></textarea>

        <div class="row g-2">
          <div class="col-12">
            <a id="postButton" class="btn btn-primary w-100 disabled" href="#" target="_blank" rel="noopener noreferrer">Xに投稿</a>
          </div>
        </div>

        <div id="toast" class="text-success fw-bold small mt-3" aria-live="polite"></div>
      </div>
    </section>
  </main>

  <script>
    const LIMIT = 140;

    const prefix = "あの、余計なお世話なのかも知れないですけど、";
    const suffix = "あ、本当に余計なお世話でしたね、ごめんなさい…";

    const bodyText = document.getElementById("bodyText");
    const hashtagText = document.getElementById("hashtagText");
    const resultText = document.getElementById("resultText");
    const finalCount = document.getElementById("finalCount");
    const postButton = document.getElementById("postButton");
    const clearBody = document.getElementById("clearBody");
    const clearHashtag = document.getElementById("clearHashtag");
    const toast = document.getElementById("toast");

    function normalizeHashtags(value) {
      return value
        .split(/[\s,、]+/)
        .map((tag) => tag.trim())
        .filter(Boolean)
        .map((tag) => tag.startsWith("#") ? tag : `#${tag}`)
        .join(" ");
    }

    function buildPost() {
      const body = bodyText.value.trim();
      const hashtags = normalizeHashtags(hashtagText.value);

      const lines = [prefix];

      if (body) {
        lines.push("", body);
      }

      lines.push("", suffix);

      if (hashtags) {
        lines.push("", hashtags);
      }

      return lines.join("\n");
    }

    function getCounterClass(length) {
      if (length > LIMIT) return "badge rounded-pill text-bg-danger";
      if (length > LIMIT * 0.85) return "badge rounded-pill text-bg-warning";
      return "badge rounded-pill text-bg-success";
    }

    function updateResult() {
      const post = buildPost();
      const length = [...post].length;
      const hasContent = bodyText.value.trim().length > 0 || hashtagText.value.trim().length > 0;
      const isPostable = hasContent && length <= LIMIT;

      resultText.value = hasContent ? post : "";
      finalCount.textContent = `${hasContent ? length : 0} / ${LIMIT}`;
      finalCount.className = getCounterClass(hasContent ? length : 0);

      if (isPostable) {
        postButton.classList.remove("disabled");
        postButton.href = `https://twitter.com/intent/tweet?text=${encodeURIComponent(post)}`;
        postButton.setAttribute("aria-disabled", "false");
      } else {
        postButton.classList.add("disabled");
        postButton.href = "#";
        postButton.setAttribute("aria-disabled", "true");
      }

      toast.textContent = "";
    }

    async function copyResult() {
      if (!resultText.value.trim()) return;

      try {
        await navigator.clipboard.writeText(resultText.value);
        toast.textContent = "コピーしました。";
      } catch (error) {
        resultText.select();
        document.execCommand("copy");
        toast.textContent = "コピーしました。";
      }
    }

    bodyText.addEventListener("input", updateResult);
    hashtagText.addEventListener("input", updateResult);
    resultText.addEventListener("click", copyResult);

    clearBody.addEventListener("click", () => {
      bodyText.value = "";
      updateResult();
      bodyText.focus();
    });

    clearHashtag.addEventListener("click", () => {
      hashtagText.value = "";
      updateResult();
      hashtagText.focus();
    });

    updateResult();
  </script>
</body>
</html>
