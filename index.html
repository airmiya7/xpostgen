<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>X投稿文ジェネレーター</title>

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-3">
  <div class="row justify-content-center">
    
    <!-- 幅をレスポンシブ制御 -->
    <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">
      
      <div class="card shadow-sm">
        <div class="card-body">

          <h5 class="card-title mb-4 text-center">X投稿文ジェネレーター</h5>

          <!-- 繰り返し文字 -->
          <div class="mb-3">
            <label class="form-label">繰り返す文字</label>
            <input id="repeatText" class="form-control" placeholder="さち" />
          </div>

          <!-- ハッシュタグ -->
          <div class="mb-3">
            <label class="form-label">ハッシュタグなど（空でもOK）</label>
            <input id="suffixText" class="form-control" placeholder="#蓮ノ空6th福岡Day1" />
          </div>

          <!-- 結果 -->
          <div class="mb-3">
            <label class="form-label">生成結果</label>
            <textarea id="resultText" class="form-control" rows="4" readonly></textarea>
          </div>

          <!-- 文字数 -->
          <div class="mb-3 text-end">
            <span id="charCount" class="badge bg-secondary">0 / 140</span>
          </div>

          <!-- ボタン -->
          <button id="postButton" class="btn btn-primary w-100">
            Xに投稿する
          </button>

        </div>
      </div>

    </div>
  </div>
</div>

<script>
  const repeatText = document.getElementById("repeatText");
  const suffixText = document.getElementById("suffixText");
  const resultText = document.getElementById("resultText");
  const charCount = document.getElementById("charCount");
  const postButton = document.getElementById("postButton");

  const LIMIT = 140;

  function generatePost() {
    const repeat = repeatText.value;
    const suffix = suffixText.value.trim();

    if (!repeat) {
      resultText.value = "";
      charCount.textContent = "0 / 140";
      charCount.className = "badge bg-secondary";
      return;
    }

    const suffixPart = suffix ? " " + suffix : "";
    const maxRepeatLength = LIMIT - suffixPart.length;

    let repeated = "";

    while ((repeated + repeat).length <= maxRepeatLength) {
      repeated += repeat;
    }

    const finalText = repeated + suffixPart;

    resultText.value = finalText;
    charCount.textContent = finalText.length + " / 140";

    if (finalText.length > 120) {
      charCount.className = "badge bg-warning text-dark";
    }
    if (finalText.length >= 140) {
      charCount.className = "badge bg-danger";
    }
  }

  function postToX() {
    const text = encodeURIComponent(resultText.value);
    const url = `https://twitter.com/intent/tweet?text=${text}`;
    window.open(url, "_blank");
  }

  repeatText.addEventListener("input", generatePost);
  suffixText.addEventListener("input", generatePost);
  postButton.addEventListener("click", postToX);
</script>

</body>
</html>
