<div class="container-fluid py-3 px-2 px-sm-3 px-md-4">
  <div class="row justify-content-center g-0">

    <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5 px-0">

      <div class="card shadow-sm">
        <div class="card-body">

      <h3 class="card-title">X推し発狂ジェネレーター</h3>
      <h6 class="card-subtitle mb-4 text-body-secondary">推しへの愛を叫ぼう</h6>

      <!-- 繰り返し文字 -->
      <div class="mb-3">
        <label class="form-label">繰り返す文字（推しの名）</label>

        <div class="input-group">
          <input id="repeatText" class="form-control">
          <button class="btn btn-outline-secondary btn-clear" type="button" id="clearRepeat">×</button>
        </div>
        <div class="form-text text-end">
          <span id="repeatCount" class="badge bg-secondary">0 / 140</span>
        </div>
      </div>

      <!-- ハッシュタグ -->
      <div class="mb-3">
        <label class="form-label">ハッシュタグなど（空でもOK）</label>

        <div class="input-group">
          <input id="suffixText" class="form-control">
          <button class="btn btn-outline-secondary btn-clear" type="button" id="clearSuffix">×</button>
        </div>
        <div class="form-text text-end">
          <span id="suffixCount" class="badge bg-secondary">0 / 140</span>
        </div>
      </div>

      <!-- ハッシュチェックボックス -->
      <div class="mb-5">
        <label class="form-label">よく使うハッシュタグ</label>

        <div class="d-flex flex-wrap gap-2">

          <div class="form-check">
            <input class="form-check-input hashtag-check" type="checkbox" value="#蓮ノ空" id="tag1">
            <label class="form-check-label" for="tag1">#蓮ノ空</label>
          </div>

          <div class="form-check">
            <input class="form-check-input hashtag-check" type="checkbox" value="#リンクラ" id="tag2">
            <label class="form-check-label" for="tag2">#リンクラ</label>
          </div>

          <div class="form-check">
            <input class="form-check-input hashtag-check" type="checkbox" value="#映画蓮ノ空" id="tag3">
            <label class="form-check-label" for="tag3">#映画蓮ノ空</label>
          </div>

          <div class="form-check">
            <input class="form-check-input hashtag-check" type="checkbox" value="#映画蓮ノ空感想" id="tag4">
            <label class="form-check-label" for="tag4">#映画蓮ノ空感想</label>
          </div>

          <div class="form-check">
            <input class="form-check-input hashtag-check" type="checkbox" value="#lovelive" id="tag5">
            <label class="form-check-label" for="tag5">#lovelive</label>
          </div>

        </div>
      </div>

      <!-- 結果 -->
      <div class="mb-3">
        <label class="form-label">生成結果</label>
        <textarea id="resultText" class="form-control" rows="7" readonly placeholder="ここをタップするとコピーできます"></textarea>
          <div class="form-text text-end">
            <span id="finalCount" class="badge bg-secondary">0 / 140</span>
          </div>
      </div>

      <!-- ボタン -->
      <button id="postButton" class="btn btn-outline-primary w-100 btn-lg mb-3" disabled>
        Xに投稿する
      </button>

      <div class="text-muted small">
          <a href="https://airmiya7.github.io/xpostgen/maika/" target="_blank" class="link-secondary text-decoration-none">マイカ構文ジェネレーター</a>
      </div>
      
      <div class="text-end text-muted small">
        ver. 0.217
        ©<a href="https://x.com/airmiya" target="_blank" class="link-secondary text-decoration-none">airmiya</a></div>
      </div>
    </div>
  </div>
</div>

<script>
const LIMIT = 140;

const repeatText = document.getElementById("repeatText");
const suffixText = document.getElementById("suffixText");
const resultText = document.getElementById("resultText");

const repeatCount = document.getElementById("repeatCount");
const suffixCount = document.getElementById("suffixCount");
const finalCount = document.getElementById("finalCount");

const hashtagChecks = document.querySelectorAll(".hashtag-check");

const clearRepeat = document.getElementById("clearRepeat");
const clearSuffix = document.getElementById("clearSuffix");
const postButton = document.getElementById("postButton");

// 文字数カウントと色設定
function getBadgeClass(length, limit) {
  if (length >= limit) return "badge bg-danger";
  if (length > limit * 0.85) return "badge bg-warning text-dark";
  return "badge bg-secondary";
}

// 文字数カウント
function updateCounts() {
  const suffix = suffixText.value.trim();
  const suffixPart = suffix ? " " + suffix : "";
  const repeatLimit = Math.max(LIMIT - suffixPart.length, 0);

  repeatText.maxLength = repeatLimit;

  if (repeatText.value.length > repeatLimit) {
    repeatText.value = repeatText.value.slice(0, repeatLimit);
  }

  repeatCount.textContent = `${repeatText.value.length} / ${repeatLimit}`;
  repeatCount.className = getBadgeClass(repeatText.value.length, repeatLimit);

  suffixCount.textContent = `${suffix.length} / ${LIMIT}`;
  suffixCount.className = getBadgeClass(suffix.length, LIMIT);
}

// 投稿文生成
function generatePost() {
  updateCounts();

  const repeat = repeatText.value;
  const suffix = suffixText.value.trim();
  const suffixPart = suffix ? " " + suffix : "";
  const maxRepeatLength = LIMIT - suffixPart.length;

  if (!repeat) {
    resultText.value = suffix;
  } else {
    let repeated = "";

    while ((repeated + repeat).length <= maxRepeatLength) {
      repeated += repeat;
    }

    resultText.value = repeated + suffixPart;
  }

  finalCount.textContent = `${resultText.value.length} / ${LIMIT}`;
  finalCount.className = getBadgeClass(resultText.value.length, LIMIT);

  updatePostButtonState();
}

// チェックボックスで選択したハッシュタグをsuffixTextに反映
function updateSuffixFromCheckbox() {
  const checkedTags = Array.from(hashtagChecks)
    .filter(cb => cb.checked)
    .map(cb => cb.value);

  const allPresetTags = Array.from(hashtagChecks).map(cb => cb.value);

  const currentTags = suffixText.value
    .trim()
    .split(/\s+/)
    .filter(Boolean);

  const manualTags = currentTags.filter(tag => !allPresetTags.includes(tag));
  const mergedTags = [...manualTags, ...checkedTags];

  suffixText.value = mergedTags.join(" ");

  generatePost();
}

// Xに投稿する
function postToX() {
  const text = encodeURIComponent(resultText.value);
  const url = `https://twitter.com/intent/tweet?text=${text}`;
  window.open(url, "_blank");
}

// 生成結果がない場合は投稿させない
function updatePostButtonState() {
  if (!resultText.value) {
    postButton.disabled = true;
  } else {
    postButton.disabled = false;
  }
}

// ボタンアクション
repeatText.addEventListener("input", generatePost);
suffixText.addEventListener("input", generatePost);

hashtagChecks.forEach(cb => {
  cb.addEventListener("change", updateSuffixFromCheckbox);
});

clearRepeat.addEventListener("click", () => {
  repeatText.value = "";
  generatePost();
});

clearSuffix.addEventListener("click", () => {
  suffixText.value = "";
  hashtagChecks.forEach(cb => cb.checked = false);
  generatePost();
});

resultText.addEventListener("click", async () => {
  if (!resultText.value) return;

  try {
    await navigator.clipboard.writeText(resultText.value);
    resultText.classList.add("is-valid");

    setTimeout(() => {
      resultText.classList.remove("is-valid");
    }, 1000);
  } catch (error) {
    alert("コピーに失敗しました");
  }
});

postButton.addEventListener("click", postToX);

generatePost();
</script>

</body>
