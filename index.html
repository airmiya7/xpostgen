<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>X推し発狂ジェネレーター</title>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="繰り返し文字とハッシュタグを組み合わせて、140文字以内のX投稿文を自動生成できるツール。">

  <!-- OGP（LINE / Discord / Facebook など） -->
  <meta property="og:title" content="X推し発狂ジェネレーター">
  <meta property="og:description" content="繰り返し投稿を140文字以内で自動生成。ハッシュタグも簡単追加。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://airmiya7.github.io/xpostgen/">

  <!-- X（旧Twitter）カード -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="X推し発狂ジェネレーター">
  <meta name="twitter:description" content="現場用・繰り返し投稿を自動生成できるツール">

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container-fluid py-3 px-2 px-sm-3 px-md-4">
  <div class="row justify-content-center g-0">

    <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5 px-0">

      <div class="card shadow-sm">
        <div class="card-body">

      <h3 class="card-title">X推し発狂ジェネレーター</h3>
      <h6 class="card-subtitle mb-4 text-body-secondary">推しへの愛を叫びましょう。</h6>

      <!-- 繰り返し文字 -->
      <div class="mb-3">
        <label class="form-label">繰り返す文字</label>
        <input id="repeatText" class="form-control" placeholder="さち" />
      </div>

      <!-- ハッシュタグ -->
      <div class="mb-3">
        <label class="form-label">ハッシュタグなど（空でもOK）</label>
        <input id="suffixText" class="form-control" placeholder="#蓮ノ空6th福岡Day1" />
      </div>
      <div class="mb-3">
        <label class="form-label">よく使うハッシュタグ</label>

        <div class="d-flex flex-wrap gap-2">

          <div class="form-check">
            <input class="form-check-input hashtag-check" type="checkbox" value="#蓮ノ空" id="tag1">
            <label class="form-check-label" for="tag1">#蓮ノ空</label>
          </div>

          <div class="form-check">
            <input class="form-check-input hashtag-check" type="checkbox" value="#リンクラ" id="tag2">
            <label class="form-check-label" for="tag2">#リンクラ</label>
          </div>

          <div class="form-check">
            <input class="form-check-input hashtag-check" type="checkbox" value="#lovelive" id="tag3">
            <label class="form-check-label" for="tag3">#lovelive</label>
          </div>

        </div>
      </div>

      <!-- 結果 -->
      <div class="mb-3">
        <label class="form-label">生成結果</label>
        <textarea id="resultText" class="form-control" rows="7" readonly></textarea>
      </div>

      <!-- 文字数 -->
      <div class="mb-3">
        <span id="charCount" class="badge bg-secondary">0 / 140</span>
      </div>

      <!-- ボタン -->
      <button id="postButton" class="btn btn-outline-primary w-100 mb-3">
        Xに投稿する
      </button>
       <div class="text-end text-muted small">Ver. 0.217 ©airmiya</div>

    </div>
    </div>
  </div>
</div>

<script>
  const repeatText = document.getElementById("repeatText");
  const suffixText = document.getElementById("suffixText");
  const resultText = document.getElementById("resultText");
  const charCount = document.getElementById("charCount");
  const postButton = document.getElementById("postButton");

  const LIMIT = 140;

  function generatePost() {
    const repeat = repeatText.value;
    const suffix = suffixText.value.trim();

    if (!repeat) {
      resultText.value = "";
      charCount.textContent = "0 / 140";
      charCount.className = "badge bg-secondary";
      return;
    }

    const suffixPart = suffix ? " " + suffix : "";
    const maxRepeatLength = LIMIT - suffixPart.length;

    let repeated = "";

    while ((repeated + repeat).length <= maxRepeatLength) {
      repeated += repeat;
    }

    const finalText = repeated + suffixPart;

    resultText.value = finalText;
    charCount.textContent = finalText.length + " / 140";

    // 文字数カラー変化（おまけ）
    if (finalText.length > 120) {
      charCount.className = "badge bg-warning text-dark";
    }
    if (finalText.length >= 140) {
      charCount.className = "badge bg-danger";
    }
  }
  const hashtagChecks = document.querySelectorAll(".hashtag-check");

  function updateSuffixFromCheckbox() {
    const selected = [];

    hashtagChecks.forEach(cb => {
      if (cb.checked) {
        selected.push(cb.value);
      }
    });

    // 半角スペースで結合
    suffixText.value = selected.join(" ");

    generatePost();
  }

  // チェック変更時に反映
  hashtagChecks.forEach(cb => {
    cb.addEventListener("change", updateSuffixFromCheckbox);
  });

  function postToX() {
    const text = encodeURIComponent(resultText.value);
    const url = `https://twitter.com/intent/tweet?text=${text}`;
    window.open(url, "_blank");
  }

  repeatText.addEventListener("input", generatePost);
  suffixText.addEventListener("input", generatePost);
  postButton.addEventListener("click", postToX);
</script>

</body>
</html>
